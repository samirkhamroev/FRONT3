<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json">
    <!-- Для Android -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#8e24aa">
    <!-- Для iOS -->
    <link rel="apple-touch-icon" href="/icons/favicon-128x128.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Zаметки (PWA)</title>
    <!-- chota CSS -->
    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
    <link rel="icon" href="/icons/favicon.ico" sizes="16x16" type="image/ico">
    <style>
        :root {
            --color-primary: #8e24aa;
            --color-lightGrey: #f3e5f5;
            --color-grey: #ce93d8;
            --color-darkGrey: #4a148c;
            --bg-color: #faf8fc;
            --font-family-sans: 'Inter', sans-serif;
            --font-family-mono: Consolas, monaco, monospace;
        }
        body { background-color: var(--bg-color); }
        header h1 { font-weight: 800; color: var(--color-primary); }
    </style>
</head>
<body>
    <header>
        <h1 class="is-center" style="margin-top: 1rem;">Zаметки</h1>
        <nav class="tabs is-center">
            <button id="home-btn" class="tab active col-6">Главная</button>
            <button id="about-btn" class="tab col-6">О приложении</button>
        </nav>
    </header>

    <main id="app-content" class="container" style="margin-top: 2rem;">
        <!-- Динамический контент -->
    </main>

    <footer class="container" style="margin-top: 2rem;">
        <button id="enable-push" class="button primary">Включить уведомления</button>
        <button id="disable-push" class="button outline primary" style="display:none;">Отключить уведомления</button>
    </footer>

    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
